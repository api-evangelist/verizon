# ─── Supporting Types ─────────────────────────────────────────────────────────

"""
A postal address.
"""
type Address {
  street1: String!
  street2: String
  city: String!
  state: String!
  postalCode: String!
  country: String!
}

# ─── Root Types ───────────────────────────────────────────────────────────────

type Query {
  account(id: ID!): Account
  myVerizon(accountId: ID!): MyVerizon
  device(id: ID!): Device
  iotDevice(id: ID!): IoTDevice
  thingspaceDevice(id: ID!): ThingspaceDevice
  fleetTracking(accountNumber: String!): FleetTracking
  plan(id: ID!): Plan
  invoice(id: ID!): Invoice
  billingStatement(accountId: ID!, statementDate: String!): BillingStatement
  networkQuality(latitude: Float!, longitude: Float!): NetworkQuality
  fiveGCoverage(latitude: Float!, longitude: Float!): FiveGCoverage
  lteCoverage(latitude: Float!, longitude: Float!): LTECoverage
  coverageMap(region: String!): CoverageMap
  deviceLocation(deviceId: ID!): DeviceLocation
  supportRequest(id: ID!): SupportRequest
  callLogs(phoneNumberId: ID!, limit: Int): [CallLog!]!
  smsMessages(accountNumber: String!, limit: Int): [SMS!]!
  usageSummary(accountId: ID!): UsageSummary
  webhooks(accountNumber: String!): [Webhook!]!
}

type Mutation {
  activateDevice(accountNumber: String!, imei: String!, iccid: String!, planId: ID!): Device
  deactivateDevice(deviceId: ID!, reason: String): Device
  sendSMS(accountNumber: String!, toNumber: String!, body: String!): SMS
  updatePlan(lineId: ID!, planId: ID!): LineOfService
  enableTravelPass(lineId: ID!, countries: [String!]!): TravelPass
  enrollAutoPay(accountId: ID!, paymentMethodId: ID!): AutoPay
  fileAsurionClaim(deviceProtectId: ID!, claimType: String!, description: String!): AsurionClaim
  createSupportRequest(accountId: ID!, subject: String!, description: String!, priority: SupportPriority!): SupportRequest
  createWebhook(accountNumber: String!, callbackUrl: String!, events: [WebhookEvent!]!): Webhook
  deleteWebhook(webhookId: ID!): Boolean
  updateContentFilter(lineId: ID!, blockedCategories: [String!]!, ageGroup: String): ContentFilter
  enableDigitalSecure(accountId: ID!): DigitalSecure
  upgradeDevice(lineId: ID!, newDeviceModel: String!, tradeInDeviceId: ID): DeviceUpgrade
  getTradeInEstimate(deviceId: ID!): TradeInEstimate
  createAPIKey(accountNumber: String!, name: String!, scopes: [String!]!): APIKey
}

type Subscription {
  deviceStatusChanged(deviceId: ID!): Device
  dataThresholdReached(lineId: ID!, thresholdPct: Float!): DataUsage
  networkNotification(accountId: ID!): NetworkNotification
  smsReceived(accountNumber: String!): SMS
  claimStatusChanged(claimId: ID!): AsurionClaim
}
