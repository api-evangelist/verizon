"""
Verizon GraphQL Schema
Conceptual schema covering Verizon wireless account management, IoT device management
via ThingSpace, 5G Edge computing, TM Forum service management, CPaaS voice services,
billing, network quality, security features, and device protection.
Source: https://developer.verizon.com / https://thingspace.verizon.com
"""

scalar DateTime
scalar JSON
scalar PhoneNumberScalar
scalar ICCID
scalar MSISDN

# ─── Enums ──────────────────────────────────────────────────────────────────

enum AccountStatus {
  ACTIVE
  SUSPENDED
  PENDING
  CLOSED
}

enum DeviceStatus {
  ACTIVE
  INACTIVE
  DEACTIVATED
  PREACTIVE
  REPLACED
  RETIRED
}

enum PlanType {
  CONSUMER
  BUSINESS
  PREPAID
  POSTPAID
  IOT
}

enum NetworkGeneration {
  LTE
  FIVE_G_NSA
  FIVE_G_SA
  FIVE_G_UW
}

enum CallDirection {
  INBOUND
  OUTBOUND
}

enum MessageStatus {
  SENT
  DELIVERED
  FAILED
  PENDING
}

enum ClaimStatus {
  OPEN
  IN_PROGRESS
  APPROVED
  DENIED
  CLOSED
}

enum SupportPriority {
  LOW
  MEDIUM
  HIGH
  CRITICAL
}

enum WebhookEvent {
  DEVICE_ACTIVATED
  DEVICE_DEACTIVATED
  DATA_THRESHOLD_REACHED
  SMS_RECEIVED
  CALLBACK_RECEIVED
  NETWORK_STATUS_CHANGED
  PAYMENT_PROCESSED
  CLAIM_STATUS_CHANGED
}

enum UpgradeEligibility {
  ELIGIBLE
  NOT_ELIGIBLE
  PENDING
  EARLY_UPGRADE_AVAILABLE
}

enum BandwidthUnit {
  KBPS
  MBPS
  GBPS
}

enum CoverageType {
  EXCELLENT
  GOOD
  FAIR
  LIMITED
  NO_COVERAGE
}

# ─── Interfaces ──────────────────────────────────────────────────────────────

interface Node {
  id: ID!
}

interface DeviceBase {
  id: ID!
  imei: String
  status: DeviceStatus!
  createdAt: DateTime!
  updatedAt: DateTime!
}

interface PlanBase {
  id: ID!
  name: String!
  planType: PlanType!
  monthlyPrice: Float!
  contractLength: Int
}

# ─── Account and Identity ────────────────────────────────────────────────────

"""
Top-level Verizon account record representing a consumer or business account.
"""
type Account implements Node {
  id: ID!
  accountNumber: String!
  accountName: String!
  status: AccountStatus!
  billingAddress: Address
  holder: AccountHolder
  linesOfService: [LineOfService!]!
  phoneNumbers: [PhoneNumber!]!
  invoices: [Invoice!]!
  paymentMethod: PaymentMethod
  autoPay: AutoPay
  plan: Plan
  dataUsage: DataUsage
  familyBase: FamilyBase
  digitalSecure: DigitalSecure
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""
My Verizon portal representation — aggregates account, devices, and services.
"""
type MyVerizon implements Node {
  id: ID!
  account: Account!
  devices: [Device!]!
  bills: [BillingStatement!]!
  usageSummary: UsageSummary!
  notifications: [NetworkNotification!]!
  supportRequests: [SupportRequest!]!
}

"""
Primary account holder contact information.
"""
type AccountHolder implements Node {
  id: ID!
  firstName: String!
  lastName: String!
  email: String!
  phoneNumber: String
  dateOfBirth: String
  ssn: String
  account: Account!
}

"""
A phone number associated with a line of service.
"""
type PhoneNumber implements Node {
  id: ID!
  number: PhoneNumberScalar!
  lineOfService: LineOfService
  voicemail: Voicemail
  callFilter: CallFilter
  callLogs: [CallLog!]!
}

"""
A single line of service on a Verizon account.
"""
type LineOfService implements Node {
  id: ID!
  phoneNumber: PhoneNumber!
  device: Device
  plan: Plan!
  dataUsage: DataUsage!
  roamingBenefit: RoamingBenefit
  travelPass: TravelPass
  safetyMode: SafetyMode
  secureNet: SecureNet
  contentFilter: ContentFilter
  mobileHotspot: MobileHotspot
  status: AccountStatus!
  nickname: String
}

# ─── Device Management ───────────────────────────────────────────────────────

"""
A consumer or IoT device registered on a Verizon account.
"""
type Device implements Node & DeviceBase {
  id: ID!
  imei: String
  make: String!
  model: String!
  os: String
  status: DeviceStatus!
  deviceId: DeviceID
  sim: SIM
  esim: eSIM
  lineOfService: LineOfService
  networkGeneration: NetworkGeneration
  location: DeviceLocation
  devicePayment: DevicePayment
  deviceProtect: DeviceProtect
  upgradeEligibility: UpgradeEligibility
  tradeInEstimate: TradeInEstimate
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""
Composite device identifier including IMEI, MDN, ESN, and other IDs.
"""
type DeviceID implements Node {
  id: ID!
  imei: IMEI!
  mdn: String
  esn: String
  meid: String
  iccid: ICCID
  device: Device!
}

"""
IMEI representation for a device.
"""
type IMEI {
  value: String!
  tac: String
  manufacturer: String
  modelName: String
  isValid: Boolean!
}

"""
Physical SIM card associated with a device.
"""
type SIM implements Node {
  id: ID!
  iccid: ICCID!
  status: DeviceStatus!
  carrier: String
  activatedAt: DateTime
  device: Device
}

"""
Embedded SIM (eSIM) profile for a device.
"""
type eSIM implements Node {
  id: ID!
  eid: String!
  profileStatus: String!
  activationCode: String
  carrier: String
  device: Device
  activatedAt: DateTime
}

# ─── IoT Devices ─────────────────────────────────────────────────────────────

"""
Generic IoT device managed on the ThingSpace platform.
"""
type IoTDevice implements Node & DeviceBase {
  id: ID!
  imei: String
  name: String!
  status: DeviceStatus!
  accountNumber: String!
  groupName: String
  ipAddress: String
  firmware: String
  lastContact: DateTime
  dataUsage: DataUsage
  smsMessages: [SMS!]!
  webhooks: [Webhook!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""
ThingSpace-managed IoT device with full platform capabilities.
"""
type ThingspaceDevice implements Node & DeviceBase {
  id: ID!
  imei: String
  accountName: String!
  status: DeviceStatus!
  groupName: String
  leadingImsi: String
  ipAddress: String
  publicIp: String
  dataUsage: DataUsage
  diagnostics: JSON
  firmware: String
  lastActivatedAt: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""
IoT device registered under the ThingsborneDevice family.
"""
type ThingsborneDevice implements Node & DeviceBase {
  id: ID!
  imei: String
  status: DeviceStatus!
  accountNumber: String!
  deviceKind: String!
  sensorData: JSON
  lastReported: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""
Connected car device providing telematics and diagnostics.
"""
type ConnectCarDevice implements Node & DeviceBase {
  id: ID!
  imei: String
  vin: String!
  make: String
  model: String
  year: Int
  status: DeviceStatus!
  location: DeviceLocation
  diagnosticData: JSON
  tripHistory: JSON
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""
Hum OBD-II vehicle diagnostics device.
"""
type HumDevice implements Node & DeviceBase {
  id: ID!
  imei: String
  vin: String!
  status: DeviceStatus!
  vehicleMake: String
  vehicleModel: String
  vehicleYear: Int
  diagnosticAlerts: [String!]!
  location: DeviceLocation
  emergencyAlerts: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""
Fleet tracking record for commercial vehicle and asset management.
"""
type FleetTracking implements Node {
  id: ID!
  accountNumber: String!
  fleetName: String!
  devices: [ConnectCarDevice!]!
  totalVehicles: Int!
  activeVehicles: Int!
  geofences: [JSON]
  reports: JSON
  updatedAt: DateTime!
}

# ─── Plans and Services ───────────────────────────────────────────────────────

