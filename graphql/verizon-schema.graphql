# ─── Communications ───────────────────────────────────────────────────────────

"""
A voice call record.
"""
type VoiceCall implements Node {
  id: ID!
  fromNumber: PhoneNumber!
  toNumber: String!
  direction: CallDirection!
  startedAt: DateTime!
  endedAt: DateTime
  durationSeconds: Int
  recordingUrl: String
  transcription: String
}

"""
Call log entry for a phone number.
"""
type CallLog implements Node {
  id: ID!
  phoneNumber: PhoneNumber!
  call: VoiceCall!
  timestamp: DateTime!
  notes: String
}

"""
An SMS text message.
"""
type SMS implements Node {
  id: ID!
  fromNumber: String!
  toNumber: String!
  body: String!
  status: MessageStatus!
  sentAt: DateTime!
  deliveredAt: DateTime
}

"""
An MMS multimedia message.
"""
type MMS implements Node {
  id: ID!
  fromNumber: String!
  toNumber: String!
  body: String
  mediaUrls: [String!]!
  status: MessageStatus!
  sentAt: DateTime!
  deliveredAt: DateTime
}

"""
Voicemail box for a phone number.
"""
type Voicemail implements Node {
  id: ID!
  phoneNumber: PhoneNumber!
  messages: [VoicemailMessage!]!
  totalCount: Int!
  unreadCount: Int!
  transcriptionEnabled: Boolean!
}

"""
A single voicemail message.
"""
type VoicemailMessage implements Node {
  id: ID!
  fromNumber: String!
  receivedAt: DateTime!
  durationSeconds: Int!
  audioUrl: String
  transcription: String
  listened: Boolean!
}

# ─── Network ─────────────────────────────────────────────────────────────────

"""
Network quality measurement at a location or for a device.
"""
type NetworkQuality implements Node {
  id: ID!
  location: Location
  downloadSpeedMbps: Float
  uploadSpeedMbps: Float
  latencyMs: Int
  packetLossPct: Float
  networkGeneration: NetworkGeneration!
  signalStrengthDbm: Int
  measuredAt: DateTime!
}

"""
Network event notification for an account or device.
"""
type NetworkNotification implements Node {
  id: ID!
  account: Account
  device: Device
  notificationType: String!
  message: String!
  networkGeneration: NetworkGeneration
  sentAt: DateTime!
  read: Boolean!
}

"""
5G access entitlement and status for a line or device.
"""
type FiveGAccess implements Node {
  id: ID!
  lineOfService: LineOfService!
  fiveGEnabled: Boolean!
  fiveGNSA: Boolean!
  fiveGSA: Boolean!
  ultraWideband: Boolean!
  lastChecked: DateTime!
}

"""
5G Non-Standalone (NSA) connectivity status.
"""
type FiveGNSA implements Node {
  id: ID!
  device: Device!
  connected: Boolean!
  bandBands: [String!]!
  downloadMbps: Float
  uploadMbps: Float
  measuredAt: DateTime!
}

"""
5G Ultra Wideband (mmWave / C-band) connectivity status.
"""
type FiveGUW implements Node {
  id: ID!
  device: Device!
  connected: Boolean!
  uwBand: String
  downloadMbps: Float
  uploadMbps: Float
  indoorCoverage: Boolean!
  measuredAt: DateTime!
}

"""
5G coverage availability at a geographic area.
"""
type FiveGCoverage implements Node {
  id: ID!
  location: Location!
  coverageType: CoverageType!
  fiveGType: String
  indoorCoverage: Boolean!
  updatedAt: DateTime!
}

"""
LTE network coverage at a geographic area.
"""
type LTECoverage implements Node {
  id: ID!
  location: Location!
  coverageType: CoverageType!
  bandBands: [String!]!
  voLTE: Boolean!
  updatedAt: DateTime!
}

"""
Coverage map tile or polygon for a region.
"""
type CoverageMap implements Node {
  id: ID!
  region: String!
  boundingBox: JSON!
  fiveGCoverage: [FiveGCoverage!]!
  lteCoverage: [LTECoverage!]!
  updatedAt: DateTime!
}

"""
A geographic location.
"""
type Location implements Node {
  id: ID!
  latitude: Float!
  longitude: Float!
  altitude: Float
  accuracy: Float
  address: Address
  timestamp: DateTime
}

"""
Real-time or last-known location of a device.
"""
type DeviceLocation implements Node {
  id: ID!
  device: Device!
  latitude: Float!
  longitude: Float!
  altitude: Float
  accuracyMeters: Float
  speed: Float
  heading: Float
  networkGeneration: NetworkGeneration
  timestamp: DateTime!
}

# ─── Security and Controls ────────────────────────────────────────────────────

"""
Safety Mode feature that slows data to 128 Kbps after allowance is exhausted.
"""
type SafetyMode implements Node {
  id: ID!
  lineOfService: LineOfService!
  enabled: Boolean!
  activatesAt: Float
  currentSpeedKbps: Int
}

"""
Secure Net (network-level malware and content filtering) feature.
"""
type SecureNet implements Node {
  id: ID!
  account: Account!
  enabled: Boolean!
  malwareProtection: Boolean!
  intrustionDetection: Boolean!
  alertsEnabled: Boolean!
  threatsBlockedThisCycle: Int
}

"""
Call filtering to block robocalls and spam.
"""
type CallFilter implements Node {
  id: ID!
  phoneNumber: PhoneNumber!
  enabled: Boolean!
  spamRiskBlocked: Boolean!
  robocallBlocked: Boolean!
  allowList: [String!]!
  blockList: [String!]!
}

"""
Content filtering settings for a line (parental controls).
"""
type ContentFilter implements Node {
  id: ID!
  lineOfService: LineOfService!
  enabled: Boolean!
  ageGroup: String
  blockedCategories: [String!]!
  allowedApps: [String!]!
}

"""
Family Base parental control service for an account.
"""
type FamilyBase implements Node {
  id: ID!
  account: Account!
  enabled: Boolean!
  managedLines: [LineOfService!]!
  usageLimits: JSON
  locationSharing: Boolean!
  bedtimeMode: Boolean!
}

"""
Digital Secure comprehensive security suite for an account.
"""
type DigitalSecure implements Node {
  id: ID!
  account: Account!
  enabled: Boolean!
  vpnEnabled: Boolean!
  passwordManagerEnabled: Boolean!
  identityMonitorEnabled: Boolean!
  darkWebMonitoring: Boolean!
  safeWifiEnabled: Boolean!
  devicesProtected: Int!
}

