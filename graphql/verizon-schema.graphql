}

"""
Text/messaging plan or add-on.
"""
type TextPlan implements Node & PlanBase {
  id: ID!
  name: String!
  planType: PlanType!
  monthlyPrice: Float!
  contractLength: Int
  unlimitedMessages: Boolean!
  internationalEnabled: Boolean!
  mmsEnabled: Boolean!
}

"""
Shared data pool across multiple lines or devices.
"""
type SharedData implements Node {
  id: ID!
  accountNumber: String!
  poolName: String!
  totalGB: Float!
  usedGB: Float!
  remainingGB: Float!
  lines: [LineOfService!]!
  updatedAt: DateTime!
}

"""
Mobile hotspot feature and usage data.
"""
type MobileHotspot implements Node {
  id: ID!
  lineOfService: LineOfService!
  enabled: Boolean!
  hotspotGB: Float
  usedGB: Float!
  remainingGB: Float!
