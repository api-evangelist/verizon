naftiko: 1.0.0-alpha2
info:
  label: Verizon ThingSpace Connectivity Management API — SMS
  description: 'Verizon ThingSpace Connectivity Management API — SMS. 1 operations. Lead operation: Verizon Send SMS to Devices.
    Self-contained Naftiko capability covering one Verizon business surface.'
  tags:
  - Verizon
  - SMS
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VERIZON_API_KEY: VERIZON_API_KEY
capability:
  consumes:
  - type: http
    namespace: thingspace-connectivity-sms
    baseUri: https://thingspace.verizon.com/api/m2m/v2
    description: Verizon ThingSpace Connectivity Management API — SMS business capability. Self-contained, no shared references.
    resources:
    - name: sms-accountName-actions-send
      path: /sms/{accountName}/actions/send
      operations:
      - name: sendsmstodevices
        method: POST
        description: Verizon Send SMS to Devices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountName
          in: path
          type: string
          description: Account name
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.VERIZON_API_KEY}}'
  exposes:
  - type: rest
    namespace: thingspace-connectivity-sms-rest
    port: 8080
    description: REST adapter for Verizon ThingSpace Connectivity Management API — SMS. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/sms/{accountname}/actions/send
      name: sms-accountname-actions-send
      description: REST surface for sms-accountName-actions-send.
      operations:
      - method: POST
        name: sendsmstodevices
        description: Verizon Send SMS to Devices
        call: thingspace-connectivity-sms.sendsmstodevices
        with:
          accountName: rest.accountName
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: thingspace-connectivity-sms-mcp
    port: 9090
    transport: http
    description: MCP adapter for Verizon ThingSpace Connectivity Management API — SMS. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: verizon-send-sms-devices
      description: Verizon Send SMS to Devices
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: thingspace-connectivity-sms.sendsmstodevices
      with:
        accountName: tools.accountName
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
