naftiko: 1.0.0-alpha2
info:
  label: Verizon ThingSpace Connectivity Management API — Devices
  description: 'Verizon ThingSpace Connectivity Management API — Devices. 3 operations. Lead operation: Verizon Activate Devices.
    Self-contained Naftiko capability covering one Verizon business surface.'
  tags:
  - Verizon
  - Devices
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VERIZON_API_KEY: VERIZON_API_KEY
capability:
  consumes:
  - type: http
    namespace: thingspace-connectivity-devices
    baseUri: https://thingspace.verizon.com/api/m2m/v2
    description: Verizon ThingSpace Connectivity Management API — Devices business capability. Self-contained, no shared references.
    resources:
    - name: accounts-accountName-devices-actions-activate
      path: /accounts/{accountName}/devices/actions/activate
      operations:
      - name: activatedevices
        method: POST
        description: Verizon Activate Devices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountName
          in: path
          type: string
          description: Account name
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: accounts-accountName-devices-actions-deactivate
      path: /accounts/{accountName}/devices/actions/deactivate
      operations:
      - name: deactivatedevices
        method: POST
        description: Verizon Deactivate Devices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountName
          in: path
          type: string
          description: Account name
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: accounts-accountName-devices-actions-list
      path: /accounts/{accountName}/devices/actions/list
      operations:
      - name: listdevicesinaccount
        method: POST
        description: Verizon List Devices in Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountName
          in: path
          type: string
          description: Account name
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.VERIZON_API_KEY}}'
  exposes:
  - type: rest
    namespace: thingspace-connectivity-devices-rest
    port: 8080
    description: REST adapter for Verizon ThingSpace Connectivity Management API — Devices. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/accounts/{accountname}/devices/actions/activate
      name: accounts-accountname-devices-actions-activate
      description: REST surface for accounts-accountName-devices-actions-activate.
      operations:
      - method: POST
        name: activatedevices
        description: Verizon Activate Devices
        call: thingspace-connectivity-devices.activatedevices
        with:
          accountName: rest.accountName
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{accountname}/devices/actions/deactivate
      name: accounts-accountname-devices-actions-deactivate
      description: REST surface for accounts-accountName-devices-actions-deactivate.
      operations:
      - method: POST
        name: deactivatedevices
        description: Verizon Deactivate Devices
        call: thingspace-connectivity-devices.deactivatedevices
        with:
          accountName: rest.accountName
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{accountname}/devices/actions/list
      name: accounts-accountname-devices-actions-list
      description: REST surface for accounts-accountName-devices-actions-list.
      operations:
      - method: POST
        name: listdevicesinaccount
        description: Verizon List Devices in Account
        call: thingspace-connectivity-devices.listdevicesinaccount
        with:
          accountName: rest.accountName
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: thingspace-connectivity-devices-mcp
    port: 9090
    transport: http
    description: MCP adapter for Verizon ThingSpace Connectivity Management API — Devices. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: verizon-activate-devices
      description: Verizon Activate Devices
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: thingspace-connectivity-devices.activatedevices
      with:
        accountName: tools.accountName
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: verizon-deactivate-devices
      description: Verizon Deactivate Devices
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: thingspace-connectivity-devices.deactivatedevices
      with:
        accountName: tools.accountName
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: verizon-list-devices-account
      description: Verizon List Devices in Account
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: thingspace-connectivity-devices.listdevicesinaccount
      with:
        accountName: tools.accountName
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
